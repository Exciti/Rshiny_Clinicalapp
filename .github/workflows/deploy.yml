name: Deploy to shinyapps.io

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Install rsconnect
      run: R -e "install.packages('rsconnect')"

    - name: Deploy to shinyapps.io
      uses: BDSI-Utwente/shinyapps-deploy-github-action@v1
      with:
        appName: ${{ secrets.SHINYAPPS_APPNAME }}
        accountName: ${{ secrets.SHINYAPPS_ACCOUNT }}
        token: ${{ secrets.SHINYAPPS_TOKEN }}
        secret: ${{ secrets.SHINYAPPS_SECRET }}
